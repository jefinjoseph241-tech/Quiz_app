{% extends 'base.html' %}
{% block content %}
<section class="panel auth-panel">
    <h2>Reset Password (use admin temporary password)</h2>
    <form method="post" class="auth-form">
        <label>
            Email / Username
            <input name="username" type="text" placeholder="your email or username" required />
        </label>
        <label>
            Temporary password (provided by admin)
            <input name="temp_password" type="password" placeholder="Temporary password" required />
        </label>
        <label>
            New password
            <input name="new_password" type="password" placeholder="New password" required />
        </label>
        <label>
            Confirm new password
            <input name="confirm_password" type="password" placeholder="Confirm new password" required />
        </label>
        <button class="button button-primary" type="submit">Change Password</button>
    </form>
</section>
{% endblock %}
